<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Love!</title>
<link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app">
    
<!-- 🔐 LOCK SCREEN (VISIBLE FIRST) -->
<div id="lock" class="page">
    <h1>For My Rasamalai 💖</h1>

    <div class="boxes">
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
        <div class="box"></div>
    </div>

    <div class="dial">
        <button onclick="press(1)">1</button>
        <button onclick="press(2)">2</button>
        <button onclick="press(3)">3</button>
        <button onclick="press(4)">4</button>
        <button onclick="press(5)">5</button>
        <button onclick="press(6)">6</button>
        <button onclick="press(7)">7</button>
        <button onclick="press(8)">8</button>
        <button onclick="press(9)">9</button>
        <button onclick="press(0)">0</button>
    </div>
</div>

<!-- 🏠 HOME (HIDDEN FIRST) -->
<div id="home" class="page hidden">
    <div class="glass">
        <h1>Unakaga konjam gifts iruku open panni enanu paaru 😘</h1>

        <button onclick="openGift(1)">🎂 Birthday</button>
        <button onclick="openGift(2)">💌 Message</button>
        <button onclick="openGift(3)">😉 Surprise</button>
    </div>
</div>

<!-- 🎁 GIFT PAGE (HIDDEN FIRST) -->
<div id="giftPage" class="page hidden">
    <div class="glass" id="giftContent"></div>
</div>
<script src="script.js"></script>
</body>
</html>
