<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For My Thangakatti🥺💗</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

<!-- 🎬 INTRO -->
<div id="intro" class="intro">
    <h1 class="introText">For Someone Special 💖</h1>
</div>

<!-- 📸 BG PHOTO -->
<div class="photo-bg"></div>

<!-- 💖 HEARTS -->
<div class="hearts"></div>

<!-- 🔐 LOCKSCREEN -->
<div id="login" class="page hidden">
    <h2>Swipe up to unlock 💖</h2>
</div>

<!-- 🏠 HOME -->
<div id="home" class="page hidden">
    <div class="glass">
        <h1>Unakaga konjam gifts Iruku open panni enanu paaru 😘</h1>
        <button onclick="openGift(1)">🎂 Birthday</button>
        <button onclick="openGift(2)">💌 Message</button>
        <button onclick="openGift(3)">🌝 Surprise</button>
    </div>
</div>

<!-- 🎁 GIFTS -->
<div id="giftPage" class="page hidden">
    <div class="glass" id="giftContent"></div>
</div>

</div>

<script src="script.js"></script>
</body>
</html>
