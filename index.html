<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Love Card💖</title>

  <!-- BALOO FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<!-- 📖 BOOK CONTAINER -->
<div class="book" id="book">

<!-- 🔐 PAGE 1 -->
<div class="page active" id="page1">
  <div class="container">
    <!-- your lock content -->
  </div>
</div>

<!-- 💌 PAGE 2 -->
<div class="page" id="page2">
  <div class="container">
    <h2>Unakaga na konjam gifts lam ready panniruken 💗</h2>

    <div class="nav-buttons">
      <button onclick="goBack()">⬅ Back</button>
      <button onclick="goNext()">Next ➝</button>
    </div>
  </div>
</div>

<!-- 🎁 PAGE 3 -->
<div class="page" id="page3">
  <div class="container">

    <h2>Open your surprises thango 💖</h2>

    <div class="gifts">
      <div class="gift" onclick="openGift(1)">🎁</div>
      <div class="gift" onclick="openGift(2)">🎁</div>
      <div class="gift" onclick="openGift(3)">🎁</div>
    </div>

    <div class="nav-buttons">
      <button onclick="backToPage2()">⬅ Back</button>
    </div>

  </div>
</div>

<!-- 💌 PAGE 4 -->
<div class="page" id="page4">
  <div class="container">
    <div class="letter">
      <h2>For My Rasamalai 💖</h2>
      <p>...your text...</p>
    </div>

    <div class="nav-buttons">
      <button onclick="backToGifts()">⬅ Back</button>
    </div>
  </div>
</div>

<!-- 🎂 PAGE 5 -->
<div class="page" id="page5">
  <div class="container">

    <h2>Make a wish and blow the candle love 🥹</h2>

    <input type="number" id="ageInput" class="age-box">
    <button onclick="createCake()">Create Cake 🎂</button>

    <div id="cakeArea"></div>

    <div class="nav-buttons">
      <button onclick="backToGiftsFromCake()">⬅ Back</button>
    </div>

  </div>
</div>

<!-- ⚽ PAGE 6 -->
<div class="page" id="page6">
  <div class="container">

    <h2>Someone special has a wish for you ma 🤭</h2>
    <button onclick="playMessi()">▶ Play Audio</button>

    <div id="messiText"></div>

    <div class="nav-buttons">
      <button onclick="backToGiftsFromMessi()">⬅ Back</button>
      <button onclick="goHome()">Home</button>

</div>

</div> 
</div>

<!-- AUDIO -->
<audio id="messiAudio">
  <source src="messi-audio.mp3" type="audio/mp3">
</audio>

    <!-- 🎁 GIFT BOXES -->
    <div class="gifts">

      <div class="gift" onclick="openGift(1)">🎁</div>
      <div class="gift" onclick="openGift(2)">🎁</div>
      <div class="gift" onclick="openGift(3)">🎁</div>

    </div>

    <div class="nav-buttons">
      <button onclick="backToPage2()">⬅ Back</button>
    </div>

  </div>
</div>
<!-- 🎵 BACKGROUND MUSIC -->
<audio id="bgMusic" loop>
  <source src="bg-music.mp3" type="audio/mp3">
</audio>
<script src="script.js"></script>
</body>
</html>
